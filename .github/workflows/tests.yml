name: test

on:
  pull_request:
    branches:
      - feature/*

jobs:
  tests:
    runs-on: ubuntu-latest

    if: github.event.pull_request.base.ref == 'develop'

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Grant execute permissions to Gradle wrapper
        run: chmod +x gradlew
      
      - name: Test
        uses: mvn --batch-mode -Dmaven.test.failure.ignore=true test
      
      - name: Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true
